name: Publish SDK to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── Resolve version from tag (v1.2.3 → 1.2.3) ─────────────────────────
      - name: Set version from tag
        run: echo "PUBLISH_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      # ── Bump all package versions ──────────────────────────────────────────
      - name: Bump package versions
        run: |
          for pkg in core mcp vercel openclaw paperclip; do
            PKGJSON="${pkg}/package.json"
            echo "Bumping $pkg → $PUBLISH_VERSION"
            jq ".version = \"$PUBLISH_VERSION\"" "$PKGJSON" > tmp.$$.json && mv tmp.$$.json "$PKGJSON"
          done

      # ── Build (core first, then dependents) ───────────────────────────────
      - name: Build @cbronai/pensieve-local (core)
        run: pnpm --filter @cbronai/pensieve-local build

      - name: Build remaining packages
        run: pnpm --filter '!@cbronai/pensieve-local' -r build

      # ── Publish ───────────────────────────────────────────────────────────
      - name: Publish @cbronai/pensieve-local
        run: pnpm --filter @cbronai/pensieve-local publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cbronai/pensieve-mcp
        run: pnpm --filter @cbronai/pensieve-mcp publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cbronai/pensieve-vercel
        run: pnpm --filter @cbronai/pensieve-vercel publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cbronai/pensieve-openclaw
        run: pnpm --filter @cbronai/pensieve-openclaw publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cbronai/pensieve-paperclip
        run: pnpm --filter @cbronai/pensieve-paperclip publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "Published @cbronai/pensieve-* v$PUBLISH_VERSION"
          echo "  @cbronai/pensieve-local"
          echo "  @cbronai/pensieve-mcp"
          echo "  @cbronai/pensieve-vercel"
          echo "  @cbronai/pensieve-openclaw"
          echo "  @cbronai/pensieve-paperclip"
