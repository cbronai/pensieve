name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build @cbronai/pensieve-local (core)
        run: pnpm --filter @cbronai/pensieve-local build

      - name: Build remaining packages
        run: pnpm --filter '!@cbronai/pensieve-local' -r build
